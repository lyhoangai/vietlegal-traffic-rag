<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">VietLegal Traffic RAG Architecture</title>
  <desc id="desc">A compact public architecture diagram showing the web UI, FastAPI API, RAG pipeline, SQLite memory, Chroma-backed corpus retrieval, official-source web verification, and benchmark artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f4ec" />
      <stop offset="100%" stop-color="#fffdf8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.10" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#305e73" />
    </marker>
    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #16313d; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #4d6470; }
      .section { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #173645; }
      .copy { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #35515d; }
      .small { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4d6470; }
      .box { filter: url(#shadow); }
      .line { stroke: #305e73; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .backline { stroke: #8d6e3b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1440" height="920" rx="36" fill="url(#bg)" />

  <rect x="70" y="56" width="1300" height="104" rx="26" fill="#fffdf8" stroke="#d7c7ab" stroke-width="2" class="box" />
  <text x="110" y="106" class="title">VietLegal Traffic RAG</text>
  <text x="110" y="137" class="subtitle">Scoped Vietnamese traffic-law RAG with session memory, official-source verification, and public benchmark proof.</text>
  <rect x="1064" y="82" width="248" height="44" rx="22" fill="#173645" />
  <text x="1188" y="110" text-anchor="middle" class="small" fill="#fffdf8">Public portfolio architecture</text>

  <rect x="84" y="210" width="260" height="182" rx="26" fill="#f5fbff" stroke="#7ab0c5" stroke-width="2" class="box" />
  <text x="112" y="248" class="section">1. Web UI</text>
  <text x="112" y="281" class="copy">Static chat page served by FastAPI.</text>
  <text x="112" y="312" class="copy">SSE streaming, session sidebar,</text>
  <text x="112" y="339" class="copy">history restore, and Vietnamese TTS.</text>
  <text x="112" y="370" class="small">src/api/static/index.html</text>

  <rect x="394" y="210" width="276" height="182" rx="26" fill="#eef8f4" stroke="#7fb697" stroke-width="2" class="box" />
  <text x="424" y="248" class="section">2. FastAPI API</text>
  <text x="424" y="281" class="copy">Hosts the UI and public endpoints:</text>
  <text x="424" y="312" class="copy">/chat, /chat/stream, /chat/history,</text>
  <text x="424" y="339" class="copy">/tts, /health, and /eval/metrics.</text>
  <text x="424" y="370" class="small">src/api/main.py + src/api/routes.py</text>

  <rect x="720" y="186" width="628" height="468" rx="32" fill="#fff7eb" stroke="#d9b06b" stroke-width="2" class="box" />
  <text x="754" y="232" class="section">3. RAG Pipeline</text>
  <text x="754" y="262" class="copy">The same graph powers chat responses and benchmark runs.</text>

  <rect x="754" y="292" width="164" height="88" rx="20" fill="#fffdf8" stroke="#d9b06b" stroke-width="2" />
  <text x="836" y="338" text-anchor="middle" class="copy">Intent</text>
  <text x="836" y="362" text-anchor="middle" class="copy">Analyzer</text>

  <rect x="950" y="292" width="164" height="88" rx="20" fill="#fffdf8" stroke="#d9b06b" stroke-width="2" />
  <text x="1032" y="338" text-anchor="middle" class="copy">Query</text>
  <text x="1032" y="362" text-anchor="middle" class="copy">Router</text>

  <rect x="1146" y="292" width="164" height="88" rx="20" fill="#fffdf8" stroke="#d9b06b" stroke-width="2" />
  <text x="1228" y="338" text-anchor="middle" class="copy">Retriever</text>
  <text x="1228" y="362" text-anchor="middle" class="copy">+ Rescue</text>

  <rect x="754" y="424" width="164" height="88" rx="20" fill="#fffdf8" stroke="#d9b06b" stroke-width="2" />
  <text x="836" y="470" text-anchor="middle" class="copy">Reranker</text>

  <rect x="950" y="424" width="164" height="88" rx="20" fill="#fffdf8" stroke="#d9b06b" stroke-width="2" />
  <text x="1032" y="456" text-anchor="middle" class="copy">Official-source</text>
  <text x="1032" y="480" text-anchor="middle" class="copy">Web Verification</text>

  <rect x="1146" y="424" width="164" height="88" rx="20" fill="#fffdf8" stroke="#d9b06b" stroke-width="2" />
  <text x="1228" y="470" text-anchor="middle" class="copy">Generator</text>

  <text x="754" y="570" class="small">src/agent/graph.py + src/agent/nodes.py + src/agent/state.py</text>
  <text x="754" y="596" class="small">Modes: full, no_reranker, no_web_fallback</text>

  <rect x="84" y="456" width="260" height="160" rx="24" fill="#f3f0fb" stroke="#9888c3" stroke-width="2" class="box" />
  <text x="112" y="495" class="section">4. SQLite Memory</text>
  <text x="112" y="526" class="copy">Stores recent turns by session_id.</text>
  <text x="112" y="553" class="copy">Used for follow-up questions and</text>
  <text x="112" y="580" class="copy">history recovery after refresh.</text>
  <text x="112" y="606" class="small">src/memory/store.py</text>

  <rect x="394" y="456" width="276" height="160" rx="24" fill="#fff3ef" stroke="#d3947e" stroke-width="2" class="box" />
  <text x="424" y="495" class="section">5. Corpus + Chroma</text>
  <text x="424" y="526" class="copy">Active 2025 legal documents are loaded</text>
  <text x="424" y="553" class="copy">through the manifest and indexed for</text>
  <text x="424" y="580" class="copy">collection-aware retrieval.</text>
  <text x="424" y="606" class="small">src/ingest/build_db.py + data/manifest.json</text>

  <rect x="84" y="696" width="1264" height="164" rx="28" fill="#fffdf8" stroke="#d7c7ab" stroke-width="2" class="box" />
  <text x="118" y="740" class="section">6. Public Benchmark and Dataset Artifacts</text>
  <text x="118" y="772" class="copy">A compact eval package and benchmark runner create recruiter-facing proof without changing runtime APIs.</text>
  <text x="118" y="804" class="copy">Outputs include the Hugging Face dataset, Markdown summary, JSON results, screenshots, and demo assets.</text>
  <text x="118" y="834" class="small">datasets/vietlegal-traffic-eval-v1 + docs/benchmarks/latest_* + docs/assets/*</text>

  <path d="M344 301 L394 301" class="line" />
  <path d="M670 301 L720 301" class="line" />
  <path d="M214 456 L214 392" class="line" />
  <path d="M532 456 L532 392" class="line" />
  <path d="M670 520 L720 520" class="line" />
  <path d="M1032 654 L1032 696" class="backline" />
  <path d="M532 616 L532 696" class="backline" />
  <path d="M214 616 L214 696" class="backline" />

  <text x="1080" y="882" class="small">Scope: traffic-law RAG demo, not a general legal AI platform</text>
</svg>
