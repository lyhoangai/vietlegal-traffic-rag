services:
  vietlegal:
    build:
      context: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      CHROMA_DB_PATH: /app/storage/chroma_db
      MEMORY_DB_PATH: /app/storage/chat_memory.db
    volumes:
      - vietlegal_storage:/app/storage
    restart: unless-stopped

volumes:
  vietlegal_storage:
